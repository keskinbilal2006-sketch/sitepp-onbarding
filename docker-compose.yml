version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: sitepp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sitepp
      POSTGRES_USER: sitepp
      POSTGRES_PASSWORD: sitepp
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

