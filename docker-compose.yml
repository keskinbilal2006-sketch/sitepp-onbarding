services:
  postgres:
    image: postgres:16-alpine
    container_name: sitepp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sitepp
      POSTGRES_USER: sitepp
      POSTGRES_PASSWORD: sitepp
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sitepp -d sitepp']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: sitepp-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://sitepp:sitepp@postgres:5432/sitepp?schema=public
      JWT_ACCESS_SECRET: change-me-access-secret
      JWT_REFRESH_SECRET: change-me-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_SALT_ROUNDS: 10
      UPLOAD_DIR: ./uploads
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 200
      LOG_LEVEL: info
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: sitepp-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
